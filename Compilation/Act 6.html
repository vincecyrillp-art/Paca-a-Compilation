<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORYN Login</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="oryn.png">
  <style>
    :root {
      --h1-font: 'Century Gothic', serif;
      --forgot-color: #ae95ff; /* Editable color for Forgot Password */
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    .login-page {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('log in bg.jpg') no-repeat center center/cover;
      position: relative;
    }

    .login-page::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.5);
    }

    .login-box {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      padding: 40px;
      width: 420px;
      text-align: center;
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    }

    .login-box h1 {
      font-family: var(--h1-font);
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .login-box p {
      font-size: 0.9rem;
      margin-bottom: 10px;
      line-height: 1.4;
    }

    .login-box label {
      display: block;
      text-align: left;
      margin-bottom: 5px;
      font-size: 0.9rem;
    }

    .login-box input {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: none;
      border-radius: 8px;
      outline: none;
    }

    .options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      margin-bottom: 20px;
    }

    .options .remember {
      display: flex;
      align-items: left;
      font-size: 0.5rem;
      gap: 5px;
    }

    .options a {
      color: var(--forgot-color);
      text-decoration: none;
      font-weight: 500;
    }

    .options a:hover {
      text-decoration: underline;
    }

    .login-box button {
      width: 100%;
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      color: #0a1a3f;
      background: #a8f5ff;
      border: none;
      border-radius: 30px;
      cursor: pointer;
      transition: background 0.3s ease;
      margin-bottom: 10px;
    }

    .login-box button:hover {
      background: #00e1ff;
    }

    .divider {
      margin-bottom: 10px;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    .google-btn {
      background: #fff;
      color: #333;
    }

    .signup {
      font-size: 0.8rem;
      margin-top: 10px;
    }

    .signup a {
      color: #00e1ff;
      text-decoration: none;
      font-weight: bold;
    }

    .signup a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="login-page">
    <div class="login-box">
      <h1>Welcome to ORYN</h1>
      <p>Sign in to explore smart innovations where technology and design meet.</p>
      
      <form>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>
        
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required>
        
        <div class="options">
          <div class="remember">
            <input type="checkbox" id="remember">
            <label for="remember">Remember me</label>
          </div>
          <a href="#">Forgot password?</a>
        </div>
        
        <button type="submit">Log In</button>
        
        <div class="divider">Or</div>
        
        <button type="button" class="google-btn">Sign in with Google</button>
      </form>
      
      <div class="signup">
        Don’t have an account? <a href="#">Sign Up</a>
      </div>
    </div>
  </div>
</body>
</html>
