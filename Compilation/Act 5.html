<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ORYN Hero Page</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="oryn.png">
  <style>
    :root {
      /* Editable font family for h1 */
      --h1-font: 'Bigerside Expanded', serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body, html {
      height: 100%;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
    }

    nav {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 20px 40px;
      background: rgba(0, 0, 0, 0.4);
      position: fixed;
      width: 100%;
      top: 0;
      z-index: 100;
    }

    nav a {
      margin-left: 45px;
      text-decoration: none;
      color: #fff;
      font-weight: 500;
      transition: color 0.3s ease;
    }

    nav a:hover {
      color: rgb(53, 215, 255);
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      background: url('hero bg.jpg') no-repeat center center/cover;
      position: relative;
    }

    .hero::after {
      content: "";
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.3);
    }

    .hero-content {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 60px 80px;
    }

    .hero-left h1 {
      font-size: 13.5rem;
      font-weight: bold;
      margin-bottom: -20px;
      margin-left: -10px;
      font-family: var(--h1-font);
    }

    .hero-right {
      max-width: 500px;
      text-align: left;
    }

    .hero-right p {
      font-size: 0.9rem;
      line-height: 1.6;
      margin-bottom: 40px;
    }

    .hero-right button {
      padding: 15px 35px;
      font-size: 1rem;
      font-weight: bold;
      color: #0a1a3f;
      background: #ccf9ff;
      border: none;
      border-radius: 30px;
      margin-bottom: 30px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .hero-right button:hover {
      background: #00e1ff;
    }
  </style>
</head>
<body>
  <nav>
    <a href="#about">About us</a>
    <a href="#community">Community</a>
    <a href="#residencies">Residencies</a>
    <a href="#courses">Courses</a>
    <a href="#questions">Questions</a>
  </nav>

  <section class="hero">
    <div class="hero-content">
      <div class="hero-left">
        <h1>ORYN</h1>
      </div>
      <div class="hero-right">
        <p>Welcome to ORYN — where technology and design meet. Inspired by innovation and minimalism, ORYN creates smart, clean, and future-ready solutions built with precision and modern creativity.</p>
        <button>Get started ➤</button>
      </div>
    </div>
  </section>
</body>
</html>
